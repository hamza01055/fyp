name: Pylint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run Pylint
        run: |
          find . -type f -name "*.py" \
            ! -path "./.venv/*" \
            ! -path "./frontend/*" \
            ! -path "./node_modules/*" \
            | xargs pylint --disable=C0114,C0115,C0116 || true
